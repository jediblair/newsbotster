worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 1m;

  # Hide nginx version
  server_tokens off;

  # Rate limiting — exempt localhost and Docker bridge networks
  geo $limit_key {
    default        $binary_remote_addr;
    127.0.0.0/8    "";   # loopback
    172.16.0.0/12  "";   # Docker bridge (172.17.x.x etc.)
    192.168.0.0/16 "";   # local LAN
    10.0.0.0/8     "";   # alternate Docker / VPN ranges
  }

  limit_req_zone $limit_key zone=api:10m rate=6000r/m;
  limit_req_zone $limit_key zone=auth:10m rate=15r/m;
  limit_req_zone $limit_key zone=images:10m rate=3000r/m;

  server {
    listen 80;
    server_name _;

    # Security headers (shared config)
    include /etc/nginx/security-headers.conf;

    # Image proxy — high rate limit (each page can have many images)
    location /api/image {
      limit_req zone=images burst=60 nodelay;
      proxy_pass http://web:3000;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — strict rate limit
    location ~ ^/api/auth {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://web:3000;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://web:3000;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js app
    location / {
      proxy_pass http://web:3000;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # Block access to sensitive paths
    location ~ /\.(env|git|htaccess) {
      deny all;
      return 404;
    }
  }
}
